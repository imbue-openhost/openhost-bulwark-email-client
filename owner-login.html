<!DOCTYPE html>
<html>
<head><title>Signing in...</title>
<style>body{font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f8fafc}p{color:#64748b}</style>
</head>
<body>
<p>Signing in...</p>
<iframe id="f" src="/en/login" style="position:absolute;left:-9999px;width:1px;height:1px"></iframe>
<script>
const JMAP_USER = "owner";
const JMAP_PASS = "openhost-owner-email";

document.getElementById("f").addEventListener("load", function() {
  const doc = this.contentDocument;
  const poll = setInterval(() => {
    const e = doc.getElementById("email");
    const p = doc.getElementById("password");
    if (!e || !p) return;
    clearInterval(poll);

    // React-compatible input setter
    const set = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, "value").set;
    set.call(e, JMAP_USER);
    e.dispatchEvent(new Event("input", {bubbles: true}));
    set.call(p, JMAP_PASS);
    p.dispatchEvent(new Event("input", {bubbles: true}));

    setTimeout(() => {
      const btn = doc.querySelector('button[type="submit"]');
      if (btn) btn.click();

      // Wait for login to succeed (URL changes away from /login)
      const wait = setInterval(() => {
        try {
          if (!this.contentWindow.location.pathname.includes("login")) {
            clearInterval(wait);
            window.location.href = "/en";
          }
        } catch(err) { clearInterval(wait); window.location.href = "/en"; }
      }, 300);
    }, 300);
  }, 200);
}.bind(document.getElementById("f")));
</script>
</body>
</html>
