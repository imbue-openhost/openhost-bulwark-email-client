<!DOCTYPE html>
<html>
<head><title>Signing in...</title></head>
<body>
<p>Signing in...</p>
<script>
(async () => {
  const serverUrl = "https://email.host.zackpolizzi.com";
  const username = "owner";
  const accountId = username + "@" + serverUrl.replace("https://","");

  // Pre-seed Bulwark's localStorage auth state
  localStorage.setItem("auth-storage", JSON.stringify({
    state: {
      serverUrl,
      username,
      authMode: "basic",
      rememberMe: false,
      activeAccountId: accountId
    },
    version: 0
  }));

  localStorage.setItem("account-registry", JSON.stringify({
    state: {
      accounts: [{
        label: username,
        serverUrl,
        username,
        authMode: "basic",
        rememberMe: false,
        displayName: username,
        email: username,
        lastLoginAt: Date.now(),
        isConnected: true,
        hasError: false,
        isDefault: true,
        id: accountId,
        cookieSlot: 0,
        avatarColor: "#3b82f6"
      }],
      activeAccountId: accountId,
      defaultAccountId: accountId
    },
    version: 0
  }));

  localStorage.setItem("webmail_usernames", JSON.stringify([username]));

  // Redirect to inbox
  window.location.href = "/en";
})();
</script>
</body>
</html>
