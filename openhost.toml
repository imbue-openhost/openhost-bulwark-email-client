[app]
name = "webmail"
version = "0.1.0"
description = "Bulwark webmail client for Stalwart JMAP"

[runtime.container]
image = "Dockerfile"
port = 4000

[routing]
public_paths = []

[resources]
memory_mb = 256
cpu_millicores = 200

[data]
app_data = true

[[permissions_v2]]
service = "github.com/imbue-openhost/openhost-stalwart-email-server/services/jmap"
grants = [{key = "jmap:full_access"}]
